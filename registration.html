    color: white;
}


.navbar {
    position: center;
    top: 0;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 15px 40px;
    color: white;
}

  .navbar a {
    color: white;
    text-decoration: none;
    margin-right: 20px;
}

  .nav-right button {
    padding: 8px 14px;
    color: white;
    background-color: #ffe734;
    cursor: pointer;
  }
  
  .mynavbar{
    background-color: #6cb4e1;
  }


.create-btn {
    background-color: #00bcd4;
    padding: 8px 15px;
    border-radius: 5px;
    text-decoration: none;
    color: white;
}

/* Hero Background */
.hero {
    height: 90vh;
    background: url("https://via.placeholder.com/1920x1080") no-repeat center center/cover;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Registration Card */
.registration-card {
    display: flex;
    width: 800px;
    background: rgba(227, 111, 118, 0.917);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    padding: 30px;
}

.footer {
    background: #111;
    color: white;
    text-align: center;
    padding: 12px;
	background-color: aliceblue;
    color: rgb(7, 0, 0);
}

/* Left Panel */
.left-panel {
    width: 40%;
    text-align: center;
}

.profile-placeholder {
    width: 150px;
    height: 150px;
    background-color: white;
    color: black;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 0 auto 20px;
    font-size: 14px;
}

.upload-btn {
    margin-top: 10px;
    background-color: #ffe734;
    border: none;
    padding: 8px 12px;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

/* Right Panel */
.right-panel {
    width: 60%;
    padding-left: 10px;
}

.right-panel h1 {
    margin-bottom: 15px;
}

.instructions {
    font-size: 14px;
    margin-bottom: 15px;
}

form label {
    display: block;
    margin-top: 10px;
    font-size: 14px;
}

form input {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
    border-radius: 5px;
    border: none;
}

.row {
    display: flex;
    gap: 10px;
}

.row div {
    flex: 1;
}

.terms {
    margin-top: 15px;
    font-size: 13px;
}

.submit-btn {
    width: 100%;
    margin-top: 15px;
    padding: 10px;
    background-color: #ffe734;
    border: none;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

.cancel-btn {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
    background-color: #ccc;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.footer {
    background: #111;
    color: white;
    text-align: center;
    padding: 12px;
	background-color: aliceblue;
    color: rgb(7, 0, 0);
}

 <section class="hero">

<div class="registration-card">
    <div class="left-panel">
        <div class="profile-placeholder">
            Profile Image
        </div>

        <input type="file" class="form-control mt-2">
        <button class="upload-btn">Upload Photo</button>
    </div>
    <div class="right-panel">

        <h1>REGISTRATION</h1>
        <p class="instructions">
            Please fill out all required fields with accurate information.
        </p>

        <form>

            <div class="row">
                <div class="col-md-6">
                    <label>First Name</label>
                    <input type="text" class="form-control">
                </div>
                <div class="col-md-6">
                    <label>Last Name</label>
                    <input type="text" class="form-control">
                </div>
            </div>

            <div class="row mt-3">
                <div class="col-md-6">
                    <label>Age</label>
                    <input type="number" class="form-control">
                </div>
                <div class="col-md-6">
                    <label>Contact Number</label>
                    <input type="text" class="form-control">
                </div>
            </div>

            <div class="mt-3">
                <label>Email</label>
                <input type="email" class="form-control">
            </div>

            <div class="mt-3">
                <label>Username</label>
                <input type="text" class="form-control">
            </div>

            <div class="mt-3">
                <label>Password</label>
                <input type="password" class="form-control">
            </div>

            <div class="form-check mt-4">
                <input class="form-check-input" type="checkbox">
                <label class="form-check-label">
                    I accept the Terms of Use and Privacy Policy
                </label>
            </div>

            <button class="submit-btn">Create My Account</button>

        </form>
