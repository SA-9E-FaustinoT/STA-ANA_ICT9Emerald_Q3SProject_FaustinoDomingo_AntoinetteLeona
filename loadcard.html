<div class="top">
    <h1>Credit & Discount System</h1>
    <h2>Current Balance: ₱<span id="balance">500.00</span></h2>
</div>
<br>
<div class="section">
    <img src="moni.png" style="width: 100px;"><br>
    <h3>Credit Balance</h3>
    <input type="number" id="addAmount" placeholder="Enter amount to add">
    <button onclick="addCredit()">Add Credit</button>
    <button class="remove-btn" onclick="removeCredit()">Remove Credit</button>
</div>
<br>
<div class="section">
    <h3>Discounts</h3>
    <input type="number" id="price" placeholder="Enter price">
    <select id="discountType">
        <option value="0">No Discount</option>
        <option value="15">Student (15%)</option>
        <option value="20">Senior Citizen (20%)</option>
        <option value="20">PWD (20%)</option>
    </select>
    <button onclick="useCredit()">Use Credit</button>
    <p>Discounted Price: ₱<span id="discountedPrice">0.00</span></p>
</div>

<script>
let balance = 500;

function addCredit() {
    let amount = Number(document.getElementById("addAmount").value);
    if (amount > 0) {
        balance += amount;
        updateBalance();
    } else {
        alert("Enter a valid amount to add!");
    }
    document.getElementById("addAmount").value = "";
}
function removeCredit() {
    let amount = Number(document.getElementById("addAmount").value);
    if (amount > 0 && amount <= balance) {
        balance -= amount;
        updateBalance();
    } else {
        alert("Invalid amount or not enough balance to remove!");
    }
    document.getElementById("addAmount").value = "";
}
function useCredit() {
    let price = Number(document.getElementById("price").value);
    let discount = Number(document.getElementById("discountType").value);
    if (price <= 0) {
        alert("Enter a valid price!");
        return;
    }
    let discountedPrice = price - (price * discount / 100);
    document.getElementById("discountedPrice").textContent = discountedPrice.toFixed(2);

    if (discountedPrice > balance) {
        alert("Not enough balance!");
    } else {
        balance -= discountedPrice;
        updateBalance();
    }
    document.getElementById("price").value = "";
}

function updateBalance() {
    document.getElementById("balance").textContent = balance.toFixed(2);
}
</script>
